/* ═══════════════════════════════════
   11. CUSTOM SMOOTH SCROLL (DESKTOP)
═══════════════════════════════════ */
let isScrolling = false;

// Ease-in-out mathematical curve for beautiful slow transitions
function easeInOutQuad(t, b, c, d) {
  t /= d / 2;
  if (t < 1) return c / 2 * t * t + b;
  t--;
  return -c / 2 * (t * (t - 2) - 1) + b;
}

function customScrollTo(targetY, duration) {
  isScrolling = true;
  const startY = window.pageYOffset;
  const distance = targetY - startY;
  let startTime = null;

  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    const progress = timestamp - startTime;
    const y = easeInOutQuad(progress, startY, distance, duration);
    window.scrollTo(0, y);
    if (progress < duration) {
      requestAnimationFrame(step);
    } else {
      window.scrollTo(0, targetY);
      setTimeout(() => { isScrolling = false; }, 100); 
    }
  }
  requestAnimationFrame(step);
}

// Global function to allow buttons to use the slow scroll
function scrollToPage(pageId) {
   if (window.innerWidth <= 768) {
       document.getElementById(pageId).scrollIntoView({behavior:'smooth'});
   } else {
       const targetY = document.getElementById(pageId).offsetTop;
       customScrollTo(targetY, 1200); // 1.2 seconds duration
   }
}

window.addEventListener('wheel', (e) => {
  // Let mobile/touch devices handle scrolling natively
  if (window.innerWidth <= 768) return; 

  e.preventDefault();
  if (isScrolling) return;

  const sections = Array.from(document.querySelectorAll('.page'));
  // Calculate which page we are currently on based on viewport
  let currentIdx = Math.round(window.scrollY / window.innerHeight);
  
  let nextIdx = currentIdx;
  if (e.deltaY > 0 && currentIdx < sections.length - 1) {
    nextIdx++; // Scroll down
  } else if (e.deltaY < 0 && currentIdx > 0) {
    nextIdx--; // Scroll up
  }
  
  if (nextIdx !== currentIdx) {
    const targetY = sections[nextIdx].offsetTop;
    // 1200ms = 1.2 seconds smooth, elegant glide
    customScrollTo(targetY, 1200); 
  }
}, {passive: false});
